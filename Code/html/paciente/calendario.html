<header class="vista__encabezado">
  <h2 class="vista__titulo">Agendar Cita</h2>
  <p class="vista__descripcion">Selecciona un día y horario disponible</p>
</header>

<article class="tarjeta-cita tarjeta-cita--oculta" id="proxima-cita">
  <div class="tarjeta-cita__contenido">
    <span class="tarjeta-cita__etiqueta">Tu próxima cita</span>
    <p class="tarjeta-cita__fecha" id="proxima-cita-fecha"></p>
    <p class="tarjeta-cita__hora" id="proxima-cita-hora"></p>
  </div>
  <div class="tarjeta-cita__acciones">
    <button class="boton boton--secundario boton--pequeno" id="btn-reprogramar-proxima">Reprogramar</button>
    <button class="boton boton--secundario boton--pequeno" id="btn-cancelar-proxima">Cancelar</button>
  </div>
</article>

<div class="banner-reprogramacion banner-reprogramacion--oculto" id="banner-reprogramacion">
  <span id="texto-reprogramacion">Reprogramando cita...</span>
  <button class="boton boton--secundario boton--pequeno" id="btn-cancelar-reprogramacion">Cancelar</button>
</div>

<div class="calendario" id="calendario">
  <header class="calendario__encabezado">
    <button class="calendario__nav" id="btn-mes-anterior">&#8249;</button>
    <h3 class="calendario__mes" id="calendario-mes"></h3>
    <button class="calendario__nav" id="btn-mes-siguiente">&#8250;</button>
  </header>
  <div class="calendario__dias-semana">
    <span>Dom</span><span>Lun</span><span>Mar</span><span>Mié</span><span>Jue</span><span>Vie</span><span>Sáb</span>
  </div>
  <div class="calendario__dias" id="calendario-dias"></div>
</div>

<section class="horarios horarios--oculto" id="seccion-horarios">
  <h3 class="horarios__titulo">Horarios disponibles para <span id="fecha-seleccionada"></span></h3>
  <div class="horarios__lista" id="lista-horarios"></div>
  <p class="horarios__vacio horarios__vacio--oculto" id="sin-horarios">No hay horarios disponibles para este día.</p>
  <div class="lista-espera lista-espera--oculta" id="contenedor-lista-espera">
    <button class="boton boton--secundario" id="btn-lista-espera">Avisarme si se libera un turno</button>
  </div>
</section>

<div class="modal modal--oculto" id="modal-reserva">
  <div class="modal__contenido">
    <header class="modal__encabezado">
      <h3 class="modal__titulo" id="titulo-modal-reserva">Confirmar Reserva</h3>
      <button class="modal__boton-cerrar" id="btn-cerrar-modal">&times;</button>
    </header>
    <div class="modal__cuerpo">
      <div class="resumen-reserva">
        <p class="resumen-reserva__item"><strong>Fecha:</strong> <span id="resumen-fecha"></span></p>
        <p class="resumen-reserva__item"><strong>Hora:</strong> <span id="resumen-hora"></span></p>
      </div>
      <p class="modal__confirmacion" id="texto-confirmacion-reserva">¿Deseas confirmar esta cita?</p>
    </div>
    <footer class="modal__acciones">
      <button class="boton boton--secundario" id="btn-cancelar-reserva">Cancelar</button>
      <button class="boton boton--primario" id="btn-confirmar-reserva">Confirmar Reserva</button>
    </footer>
  </div>
</div>
