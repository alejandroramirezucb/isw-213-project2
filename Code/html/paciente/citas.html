<header class="vista__encabezado">
  <h2 class="vista__titulo">Mis Citas</h2>
  <p class="vista__descripcion">Historial y citas programadas</p>
</header>

<div class="filtros">
  <button class="filtros__boton filtros__boton--activo" data-filtro="proximas">Próximas</button>
  <button class="filtros__boton" data-filtro="pasadas">Pasadas</button>
  <button class="filtros__boton" data-filtro="canceladas">Canceladas</button>
  <button class="filtros__boton" id="btn-exportar-pdf">Exportar PDF</button>
</div>

<div class="lista-citas" id="lista-mis-citas"></div>
<p class="mensaje-vacio mensaje-vacio--oculto" id="sin-citas">No tienes citas en esta categoría.</p>

<div class="modal modal--oculto" id="modal-cancelacion">
  <div class="modal__contenido">
    <header class="modal__encabezado">
      <h3 class="modal__titulo">Cancelar Cita</h3>
      <button class="modal__boton-cerrar" id="btn-cerrar-modal-cancelacion">&times;</button>
    </header>
    <div class="modal__cuerpo">
      <p class="modal__advertencia">¿Estás seguro de que deseas cancelar esta cita?</p>
      <p class="modal__info">El horario quedará disponible para otros pacientes.</p>
    </div>
    <footer class="modal__acciones">
      <button class="boton boton--secundario" id="btn-no-cancelar">No, mantener cita</button>
      <button class="boton boton--peligro" id="btn-si-cancelar">Sí, cancelar</button>
    </footer>
  </div>
</div>
