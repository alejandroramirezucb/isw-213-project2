<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Psicoraiden - Portal del Paciente</title>
  <link rel="icon" href="../../assets/psicoraiden-logo.png">
  <link rel="stylesheet" href="../../css/paciente/estilos.css">
</head>
<body class="pagina pagina--panel">
  <header class="encabezado">
    <div class="encabezado__contenido">
      <h1 class="encabezado__logo">Psicoraiden</h1>
      <nav class="navegacion">
        <button class="navegacion__boton navegacion__boton--activo" data-vista="calendario"><span>Agendar</span></button>
        <button class="navegacion__boton" data-vista="mis-citas"><span>Mis Citas</span></button>
        <button class="navegacion__boton" data-vista="notificaciones"><span>Notificaciones</span><span class="notificaciones__contador" id="contador-notificaciones" style="display: none;"></span></button>
        <button class="navegacion__boton" data-vista="perfil"><span>Perfil</span></button>
      </nav>
      <div class="encabezado__usuario">
        <span class="encabezado__nombre" id="nombre-usuario">Usuario</span>
        <button class="boton boton--secundario boton--pequeno" id="btn-cerrar-sesion">Salir</button>
      </div>
    </div>
  </header>

  <main class="contenido-principal">
    <section class="vista vista--activa" id="vista-calendario"></section>
    <section class="vista" id="vista-mis-citas"></section>
    <section class="vista" id="vista-notificaciones">
      <h1 class="vista-titulo">Notificaciones</h1>
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <div></div>
        <button class="boton boton--blanco" id="btn-limpiar-notificaciones" style="display: none;">Limpiar</button>
      </div>
      <div id="contenido-notificaciones"></div>
    </section>
    <section class="vista" id="vista-perfil"></section>
  </main>

  <div class="mensaje mensaje--oculto mensaje--flotante" id="mensaje-estado">
    <p class="mensaje__texto"></p>
  </div>

  <!-- Modal para cancelación de cita -->
  <div class="modal modal--oculto" id="modal-cancelacion">
    <div class="modal__contenido">
      <header class="modal__encabezado">
        <h3 class="modal__titulo">Cancelar Cita</h3>
        <button class="modal__boton-cerrar" id="btn-cerrar-modal-cancelacion">&times;</button>
      </header>
      <div class="modal__cuerpo">
        <p class="modal__advertencia">¿Estás seguro de que deseas cancelar esta cita?</p>
        <p class="modal__info">El horario quedará disponible para otros pacientes.</p>
      </div>
      <footer class="modal__acciones">
        <button class="boton boton--peligro" id="btn-si-cancelar">Sí, cancelar</button>
      </footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script src="/js/env.js"></script>
  <script src="../../js/config/Configuracion.js"></script>
  <script src="../../js/config/ClienteSupabase.js"></script>
  <script src="../../js/core/ComponenteBase.js"></script>
  <script src="../../js/core/ComponenteModal.js"></script>
  <script src="../../js/core/ComponenteFormulario.js"></script>
  <script src="../../js/core/MejoradorEventos.js"></script>
  <script src="../../js/core/ValidadorFormulario.js"></script>
  <script src="../../js/core/FormateadorFecha.js"></script>
  <script src="../../js/core/FormateadorHora.js"></script>
  <script src="../../js/core/GestorMensajesBase.js"></script>
  <script src="../../js/core/GestorMensajes.js"></script>
  <script src="../../js/core/GestorVistas.js"></script>
  <script src="../../js/core/GestorModales.js"></script>
  <script src="../../js/core/GestorFragmentos.js"></script>
  <script src="../../js/core/ServicioAutenticacionPagina.js"></script>
  <script src="../../js/core/FormateadorFachada.js"></script>
  <script src="../../js/core/MensajesFachada.js"></script>
  <script src="../../js/core/NavigacionFachada.js"></script>
  <script src="../../js/core/AutenticacionFachada.js"></script>
  <script src="../../js/core/CalendarioUtil.js"></script>
  <script src="../../js/paciente/estado/EstadoPaciente.js"></script>
  <script src="../../js/paciente/repositorio/RepositorioBloques.js"></script>
  <script src="../../js/paciente/repositorio/RepositorioCitas.js"></script>
  <script src="../../js/paciente/repositorio/RepositorioNotificaciones.js"></script>
  <script src="../../js/paciente/repositorio/RepositorioListaEspera.js"></script>
  <script src="../../js/psicologo/repositorio/RepositorioCitasPsicologo.js"></script>
  <script src="../../js/paciente/renderizador/RenderizadorCalendario.js"></script>
  <script src="../../js/paciente/renderizador/RenderizadorHorarios.js"></script>
  <script src="../../js/paciente/gestor/GestorProximaCita.js"></script>
  <script src="../../js/paciente/gestor/GestorListaEspera.js"></script>
  <script src="../../js/paciente/gestor/GestorReservas.js"></script>
  <script src="../../js/paciente/gestor/GestorMisCitas.js"></script>
  <script src="../../js/paciente/gestor/GestorReprogramacion.js"></script>
  <script src="../../js/paciente/gestor/GestorCancelacion.js"></script>
  <script src="../../js/paciente/gestor/GestorNotificaciones.js"></script>
  <script src="../../js/paciente/gestor/GestorPerfil.js"></script>
  <script src="../../js/paciente/ControladorEventosPaciente.js"></script>
  <script src="../../js/paciente/AplicacionPaciente.js"></script>
</body>
</html>
