<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Psicoraiden</title>
  <link rel="icon" href="../assets/psicoraiden-logo.png">
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="../css/compartido/comun.css">
  <link rel="stylesheet" href="../css/entrada.css">
</head>
<body class="pagina pagina--entrada">
  <main class="contenedor-entrada">
    <section class="entrada" id="seccion-login">
      <header class="entrada__encabezado">
        <h1 class="entrada__titulo">Psicoraiden</h1>
        <p class="entrada__subtitulo">Sistema de gestión de citas psicológicas</p>
      </header>

      <form class="formulario" id="formulario-login">
        <div class="formulario__grupo">
          <label class="formulario__etiqueta" for="correo-login">Correo electrónico</label>
          <input type="email" class="formulario__campo" id="correo-login" name="correo" placeholder="tu@correo.com" required>
        </div>

        <div class="formulario__grupo">
          <label class="formulario__etiqueta" for="contrasena-login">Contraseña</label>
          <input type="password" class="formulario__campo" id="contrasena-login" name="contrasena" placeholder="••••••••" required>
        </div>

        <button type="submit" class="boton boton--primario boton--completo">Iniciar sesión</button>
        <p class="formulario__enlace">¿No tienes cuenta? <a href="#" id="btn-mostrar-registro" class="enlace">Regístrate aquí</a></p>
      </form>
    </section>

    <section class="entrada entrada--oculta" id="seccion-registro">
      <header class="entrada__encabezado">
        <h1 class="entrada__titulo">Crear cuenta</h1>
        <p class="entrada__subtitulo">Únete a Psicoraiden</p>
      </header>

      <form class="formulario" id="formulario-registro">
        <div class="formulario__fila">
          <div class="formulario__grupo formulario__grupo--mitad">
            <label class="formulario__etiqueta" for="nombre-registro">Nombre</label>
            <input type="text" class="formulario__campo" id="nombre-registro" name="nombre" placeholder="Tu nombre" required>
          </div>
          <div class="formulario__grupo formulario__grupo--mitad">
            <label class="formulario__etiqueta" for="apellido-registro">Apellido</label>
            <input type="text" class="formulario__campo" id="apellido-registro" name="apellido" placeholder="Tu apellido" required>
          </div>
        </div>

        <div class="formulario__grupo">
          <label class="formulario__etiqueta" for="correo-registro">Correo electrónico</label>
          <input type="email" class="formulario__campo" id="correo-registro" name="correo" placeholder="tu@correo.com" required>
        </div>

        <div class="formulario__grupo">
          <label class="formulario__etiqueta" for="telefono-registro">Teléfono</label>
          <input type="tel" class="formulario__campo" id="telefono-registro" name="telefono" placeholder="+591 70000000">
        </div>

        <div class="formulario__grupo">
          <label class="formulario__etiqueta" for="contrasena-registro">Contraseña</label>
          <input type="password" class="formulario__campo" id="contrasena-registro" name="contrasena" placeholder="Mínimo 6 caracteres" minlength="6" required>
        </div>

        <div class="formulario__grupo">
          <label class="formulario__etiqueta">Tipo de cuenta</label>
          <div class="formulario__opciones">
            <label class="formulario__opcion">
              <input type="radio" name="tipo-cuenta" value="paciente" checked>
              <span>Paciente</span>
            </label>
            <label class="formulario__opcion">
              <input type="radio" name="tipo-cuenta" value="psicologo">
              <span>Psicólogo</span>
            </label>
          </div>
        </div>

        <button type="submit" class="boton boton--primario boton--completo">Crear cuenta</button>
        <p class="formulario__enlace">¿Ya tienes cuenta? <a href="#" id="btn-mostrar-login" class="enlace">Inicia sesión</a></p>
      </form>
    </section>

    <div class="mensaje mensaje--oculto" id="mensaje-estado">
      <p class="mensaje__texto"></p>
    </div>
  </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/env.js"></script>
    <script src="../js/config/Configuracion.js"></script>
    <script src="../js/config/ClienteSupabase.js"></script>
    <script src="../js/core/GestorMensajesBase.js"></script>
    <script src="../js/auth/GestorMensajesAuth.js"></script>
    <script src="../js/auth/GestorFormularios.js"></script>
    <script src="../js/auth/ServicioSesion.js"></script>
    <script src="../js/auth/ServicioAutenticacion.js"></script>
    <script src="../js/auth/ControladorEventosAuth.js"></script>
    <script src="../js/core/FormateadorFachada.js"></script>
    <script src="../js/core/MensajesFachada.js"></script>
    <script src="../js/core/AutenticacionFachada.js"></script>
    <script src="../js/auth/inicio.js"></script>
  </body>
</html>
