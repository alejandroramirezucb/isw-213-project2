<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Psicoraiden — Panel del Psicólogo</title>
  <link rel="icon" href="/assets/psicoraiden-logo.png">
  <link rel="stylesheet" href="/css/index.css">
  <link rel="stylesheet" href="/css/compartido/comun.css">
  <link rel="stylesheet" href="/css/psicologo/estilos.css">
</head>
<body class="pagina pagina--panel">
  {{> encabezado-psicologo}}

  <main class="contenido-principal">
    <section class="vista vista--activa" id="vista-panel">
      {{> psicologo/vista-panel}}
    </section>
    <section class="vista" id="vista-configuracion">
      {{> psicologo/vista-horarios}}
    </section>
    <section class="vista" id="vista-historial">
      {{> psicologo/vista-historial}}
    </section>
    <section class="vista" id="vista-notificaciones">
      {{> psicologo/vista-notificaciones}}
    </section>
    <section class="vista" id="vista-perfil">
      {{> psicologo/vista-perfil}}
    </section>
  </main>

  <div class="mensaje mensaje--oculto mensaje--flotante" id="mensaje-estado" role="status" aria-live="polite">
    <p class="mensaje__texto"></p>
  </div>

  <div class="modal modal--oculto" id="modal-detalle-cita" role="dialog" aria-modal="true">
    <div class="modal__contenido">
      <header class="modal__encabezado">
        <h3 class="modal__titulo">Detalle de Cita</h3>
        <button class="modal__boton-cerrar" id="btn-cerrar-detalle" aria-label="Cerrar">&times;</button>
      </header>
      <div class="modal__cuerpo">
        <div class="detalle-cita">
          <p class="detalle-cita__item"><strong>Paciente:</strong> <span id="detalle-paciente"></span></p>
          <p class="detalle-cita__item"><strong>Correo:</strong> <span id="detalle-correo"></span></p>
          <p class="detalle-cita__item"><strong>Teléfono:</strong> <span id="detalle-telefono"></span></p>
          <p class="detalle-cita__item"><strong>Fecha:</strong> <span id="detalle-fecha"></span></p>
          <p class="detalle-cita__item"><strong>Hora:</strong> <span id="detalle-hora"></span></p>
          <p class="detalle-cita__item"><strong>Estado:</strong> <span id="detalle-estado"></span></p>
        </div>
      </div>
      <footer class="modal__acciones">
        <button class="boton boton--peligro" id="btn-cancelar-cita-psicologo">Cancelar Cita</button>
      </footer>
    </div>
  </div>

  <script type="module" src="/src/cliente/psicologo/AplicacionPsicologo.js"></script>
</body>
</html>
